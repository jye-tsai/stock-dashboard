name: update-stock-prices

on:
  schedule:
    - cron: "*/30 1-6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch prices and write data.json
        run: node scripts/update-prices.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "auto update prices $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
            echo "pushed data.json"
          else
            echo "no change"
          fi
