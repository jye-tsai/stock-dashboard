name: update-stock-prices
 
on:
  # 排程改由 Cloudflare Worker 準時觸發(GitHub 內建 schedule 不準時,已移除)。
  # 保留 workflow_dispatch:讓 Cloudflare、儀表板按鈕、GitHub「Run workflow」都能觸發。
  workflow_dispatch:
 
permissions:
  contents: write
 
concurrency:
  group: update-prices
  cancel-in-progress: false
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
 
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
 
      - name: Fetch prices and write data.json
        run: node scripts/update-prices.mjs
 
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "auto update prices $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
            echo "pushed data.json"
          else
            echo "no change"
          fi
