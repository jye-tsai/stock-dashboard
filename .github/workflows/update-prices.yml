name: update-stock-prices
 
on:
  schedule:
    # 台北 = UTC+8;cron 跑在 UTC,所以填的時間 = 台北時間 − 8。分鐘錯開整點 :00 以避開 GitHub 最塞時段
    - cron: "2,17,32,47 1-5 * * 1-5"   # 交易時段 每15分(台北約 09:02–13:47,週一~五)
    - cron: "2 6 * * 1-5"              # 收盤結算 一次(台北約 14:02,週一~五)
  workflow_dispatch:
 
permissions:
  contents: write
 
concurrency:
  group: update-prices
  cancel-in-progress: false
 
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
 
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
 
      - name: Fetch prices and write data.json
        run: node scripts/update-prices.mjs
 
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "auto update prices $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
            echo "pushed data.json"
          else
            echo "no change"
          fi
